<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¡Cumpleaños de Flor! 🌸</title>
  <!-- A tener en cuenta: por favor no comentarle a la cumpleañera -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Cinzel+Decorative:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:     #E8457A;
      --rose-lt:  #FF85B3;
      --lilac:    #B86EC2;
      --lav:      #D9A8EC;
      --gold:     #D4A017;
      --gold-lt:  #F5D060;
      --cream:    #FFF8F0;
      --deep:     #5C1A47;
      --petal1:   #FF6FA8;
      --petal2:   #C86AC8;
      --petal3:   #E87090;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, #FFD6EA 0%, #F5CCFF 40%, #FFE0C0 80%, #FFDDE8 100%);
      font-family: 'Raleway', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px;
    }

    /* ── Ambient floating petals ── */
    .bg-petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bp {
      position: absolute;
      border-radius: 80% 20% 80% 20%;
      opacity: 0;
      animation: bpFall linear infinite;
    }
    @keyframes bpFall {
      0%   { transform: translateY(-80px) rotate(0deg) scale(1);   opacity: 0; }
      10%  { opacity: .55; }
      90%  { opacity: .3; }
      100% { transform: translateY(105vh) rotate(720deg) scale(.6); opacity: 0; }
    }

    /* ── Card wrapper ── */
    .card {
      position: relative; z-index: 1;
      max-width: 660px; width: 100%;
      background: rgba(255,250,253,.82);
      backdrop-filter: blur(24px);
      border-radius: 40px;
      overflow: hidden;
      box-shadow:
        0 0 0 1.5px rgba(255,180,220,.5),
        0 20px 60px rgba(140,30,100,.18),
        0 4px 12px rgba(140,30,100,.1);
      animation: cardReveal 1.1s cubic-bezier(.2,1,.3,1) both;
    }
    @keyframes cardReveal {
      from { opacity:0; transform: translateY(50px) scale(.93); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ── Gold shimmer ribbon ── */
    .ribbon {
      height: 7px;
      background: linear-gradient(90deg,
        var(--gold-lt), var(--gold), var(--rose), var(--lilac), var(--gold), var(--gold-lt));
      background-size: 300%;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer { to { background-position: -300% center; } }

    /* ══════════════════════════════
       BIG HERO FLOWER SVG
    ══════════════════════════════ */
    .hero {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px 20px 30px;
      overflow: visible;
    }

    .flower-svg-wrap {
      position: relative;
      width: 220px; height: 220px;
      animation: floatBob 3.5s ease-in-out infinite;
    }
    @keyframes floatBob {
      0%,100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-14px) rotate(2deg); }
    }

    /* Glow behind flower */
    .flower-glow {
      position: absolute; inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,69,122,.35) 0%, rgba(184,110,194,.2) 50%, transparent 75%);
      animation: glowPulse 3.5s ease-in-out infinite;
      filter: blur(18px);
    }
    @keyframes glowPulse {
      0%,100% { transform: scale(1);    opacity: .7; }
      50%      { transform: scale(1.18); opacity: 1;  }
    }

    .flower-svg { width: 220px; height: 220px; overflow: visible; }

    /* Petals */
    .petal-group { transform-origin: 110px 110px; }
    .petal-g1 { animation: petalSpin1 8s ease-in-out infinite; }
    .petal-g2 { animation: petalSpin2 8s ease-in-out infinite; }
    @keyframes petalSpin1 {
      0%,100% { transform: rotate(0deg); }
      50%      { transform: rotate(18deg); }
    }
    @keyframes petalSpin2 {
      0%,100% { transform: rotate(0deg); }
      50%      { transform: rotate(-18deg); }
    }

    /* Center bloom */
    .center-bloom { animation: centerPop 3.5s ease-in-out infinite; transform-origin: 110px 110px; }
    @keyframes centerPop {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }

    /* Sparkle stars around flower */
    .star { animation: starTwinkle ease-in-out infinite; }
    @keyframes starTwinkle {
      0%,100% { opacity:.2; transform: scale(.7); }
      50%      { opacity:1;  transform: scale(1.3); }
    }

    /* ── Hero text overlay ── */
    .hero-badge {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--rose), var(--lilac));
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: .72rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: 6px 24px;
      border-radius: 999px;
      white-space: nowrap;
      box-shadow: 0 4px 18px rgba(200,80,160,.4);
      animation: badgePop .8s .9s cubic-bezier(.2,1,.3,1) both;
    }
    @keyframes badgePop {
      from { opacity:0; transform: translateX(-50%) scale(.7); }
      to   { opacity:1; transform: translateX(-50%) scale(1); }
    }

    /* ── Body content ── */
    .body { padding: 10px 48px 52px; }

    /* Main Title */
    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(2rem, 5.5vw, 2.85rem);
      line-height: 1.22;
      text-align: center;
      color: var(--deep);
      margin-bottom: 10px;
      animation: fadeUp .9s .5s ease both;
      position: relative;
    }
    .main-title .highlight {
      background: linear-gradient(135deg, var(--rose) 20%, var(--lilac) 60%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(22px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Ornament divider */
    .ornament {
      display: flex; align-items: center; gap: 14px;
      margin: 22px auto;
      max-width: 380px;
      animation: fadeUp .7s .7s ease both;
    }
    .ornament-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,110,194,.6), transparent);
    }
    .ornament-center {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--lilac);
      animation: ornSpin 12s linear infinite;
    }
    @keyframes ornSpin { to { transform: rotate(360deg); } }

    /* ── Detail Cards ── */
    .details { display: grid; gap: 13px; margin-bottom: 34px; }

    .detail-card {
      display: grid;
      grid-template-columns: 64px 1fr;
      align-items: center;
      gap: 0;
      border-radius: 22px;
      overflow: hidden;
      animation: slideIn .7s ease both;
      box-shadow: 0 4px 18px rgba(140,30,100,.09);
      transition: transform .3s, box-shadow .3s;
    }
    .detail-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 10px 32px rgba(140,30,100,.18);
    }
    .detail-card:nth-child(1) { animation-delay: .7s; }
    .detail-card:nth-child(2) { animation-delay: .85s; }
    .detail-card:nth-child(3) { animation-delay: 1s; }

    @keyframes slideIn {
      from { opacity:0; transform: translateX(-24px); }
      to   { opacity:1; transform: translateX(0); }
    }

    .detail-icon-col {
      height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      padding: 18px 0;
    }
    .dc-date .detail-icon-col  { background: linear-gradient(160deg, #FFB6D9, #FF85B3); }
    .dc-time .detail-icon-col  { background: linear-gradient(160deg, #D9A8EC, #B86EC2); }
    .dc-place .detail-icon-col { background: linear-gradient(160deg, #F5D060, #D4A017); }

    .detail-text-col {
      background: rgba(255,248,252,.95);
      padding: 14px 20px;
    }
    .detail-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: .6rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .dc-date .detail-label  { color: var(--rose); }
    .dc-time .detail-label  { color: var(--lilac); }
    .dc-place .detail-label { color: var(--gold); }

    .detail-value {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--deep);
      line-height: 1.3;
    }

    /* ── CTA ── */
    .cta-section {
      text-align: center;
      animation: fadeUp .7s 1.1s ease both;
    }
    .cta {
      display: inline-block;
      position: relative;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem;
      color: #fff;
      padding: 18px 52px;
      border-radius: 999px;
      border: none;
      cursor: default;
      letter-spacing: .06em;
      background: linear-gradient(135deg, var(--rose) 0%, var(--lilac) 50%, var(--gold) 100%);
      background-size: 200%;
      animation: shimmer 4s linear infinite, ctaFloat 3s ease-in-out infinite;
      box-shadow: 0 8px 30px rgba(200,80,160,.45), 0 2px 8px rgba(200,80,160,.2);
    }
    .cta::before {
      content: '✦';
      margin-right: 10px;
      animation: starTwinkle 2s ease-in-out infinite;
      display: inline-block;
    }
    .cta::after {
      content: '✦';
      margin-left: 10px;
      animation: starTwinkle 2s .4s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes ctaFloat {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-7px) scale(1.02); }
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: rgba(92,26,71,.5);
      letter-spacing: .04em;
      animation: fadeUp .7s 1.3s ease both;
    }

    /* ── Bottom petal row ── */
    .petal-row {
      display: flex; justify-content: center;
      gap: 8px; margin-top: 22px;
      animation: fadeUp .7s 1.4s ease both;
    }
    .petal-row svg {
      width: 28px; height: 28px;
      animation: petalWiggle ease-in-out infinite;
    }
    .petal-row svg:nth-child(1) { animation-duration:3.2s; animation-delay:.0s; }
    .petal-row svg:nth-child(2) { animation-duration:2.8s; animation-delay:.3s; }
    .petal-row svg:nth-child(3) { animation-duration:3.5s; animation-delay:.6s; }
    .petal-row svg:nth-child(4) { animation-duration:3s;   animation-delay:.9s; }
    .petal-row svg:nth-child(5) { animation-duration:2.9s; animation-delay:1.2s; }
    @keyframes petalWiggle {
      0%,100% { transform: rotate(-12deg) scale(1); }
      50%      { transform: rotate(12deg)  scale(1.15); }
    }

    @media (max-width: 520px) {
      .body { padding: 10px 24px 40px; }
      .main-title { font-size: 1.8rem; }
      .detail-value { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<!-- Ambient floating petals -->
<div class="bg-petals" id="bgPetals"></div>

<div class="card">
  <div class="ribbon"></div>

  <!-- ══ HERO FLOWER ══ -->
  <div class="hero">
    <div class="flower-svg-wrap">
      <div class="flower-glow"></div>
      <svg class="flower-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="p1" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#FF85B3"/>
            <stop offset="100%" stop-color="#E8457A"/>
          </radialGradient>
          <radialGradient id="p2" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#D9A8EC"/>
            <stop offset="100%" stop-color="#B86EC2"/>
          </radialGradient>
          <radialGradient id="p3" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#FFB6D9"/>
            <stop offset="100%" stop-color="#FF6FA8"/>
          </radialGradient>
          <radialGradient id="cg" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#FFF0A0"/>
            <stop offset="60%" stop-color="#F5D060"/>
            <stop offset="100%" stop-color="#D4A017"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="softglow">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Outer petal layer 1 (8 petals, rose) -->
        <g class="petal-group petal-g1" filter="url(#glow)">
          <ellipse cx="110" cy="52"  rx="16" ry="42" fill="url(#p1)" opacity=".9" transform="rotate(0,110,110)"/>
          <ellipse cx="110" cy="52"  rx="16" ry="42" fill="url(#p1)" opacity=".9" transform="rotate(45,110,110)"/>
          <ellipse cx="110" cy="52"  rx="16" ry="42" fill="url(#p1)" opacity=".9" transform="rotate(90,110,110)"/>
          <ellipse cx="110" cy="52"  rx="16" ry="42" fill="url(#p1)" opacity=".9" transform="rotate(135,110,110)"/>
          <ellipse cx="110" cy="52"  rx="16" ry="42" fill="url(#p1)" opacity=".9" transform="rotate(180,110,110)"/>
          <ellipse cx="110" cy="52"  rx="16" ry="42" fill="url(#p1)" opacity=".9" transform="rotate(225,110,110)"/>
          <ellipse cx="110" cy="52"  rx="16" ry="42" fill="url(#p1)" opacity=".9" transform="rotate(270,110,110)"/>
          <ellipse cx="110" cy="52"  rx="16" ry="42" fill="url(#p1)" opacity=".9" transform="rotate(315,110,110)"/>
        </g>

        <!-- Inner petal layer 2 (8 petals, lilac, rotated 22.5°) -->
        <g class="petal-group petal-g2" filter="url(#glow)">
          <ellipse cx="110" cy="62"  rx="12" ry="36" fill="url(#p2)" opacity=".85" transform="rotate(22.5,110,110)"/>
          <ellipse cx="110" cy="62"  rx="12" ry="36" fill="url(#p2)" opacity=".85" transform="rotate(67.5,110,110)"/>
          <ellipse cx="110" cy="62"  rx="12" ry="36" fill="url(#p2)" opacity=".85" transform="rotate(112.5,110,110)"/>
          <ellipse cx="110" cy="62"  rx="12" ry="36" fill="url(#p2)" opacity=".85" transform="rotate(157.5,110,110)"/>
          <ellipse cx="110" cy="62"  rx="12" ry="36" fill="url(#p2)" opacity=".85" transform="rotate(202.5,110,110)"/>
          <ellipse cx="110" cy="62"  rx="12" ry="36" fill="url(#p2)" opacity=".85" transform="rotate(247.5,110,110)"/>
          <ellipse cx="110" cy="62"  rx="12" ry="36" fill="url(#p2)" opacity=".85" transform="rotate(292.5,110,110)"/>
          <ellipse cx="110" cy="62"  rx="12" ry="36" fill="url(#p2)" opacity=".85" transform="rotate(337.5,110,110)"/>
        </g>

        <!-- Center bloom -->
        <g class="center-bloom" filter="url(#softglow)">
          <circle cx="110" cy="110" r="34" fill="url(#cg)"/>
          <circle cx="110" cy="110" r="24" fill="#FFF8D0" opacity=".9"/>
          <circle cx="110" cy="110" r="16" fill="#FFE85A" opacity=".95"/>
          <!-- Pollen dots -->
          <circle cx="110" cy="97"  r="3" fill="#D4A017" opacity=".8"/>
          <circle cx="121" cy="103" r="2.5" fill="#D4A017" opacity=".8"/>
          <circle cx="121" cy="117" r="3" fill="#D4A017" opacity=".8"/>
          <circle cx="110" cy="123" r="2.5" fill="#D4A017" opacity=".8"/>
          <circle cx="99"  cy="117" r="3" fill="#D4A017" opacity=".8"/>
          <circle cx="99"  cy="103" r="2.5" fill="#D4A017" opacity=".8"/>
        </g>

        <!-- Sparkle stars -->
        <g class="star" style="animation-duration:2.2s;animation-delay:0s;transform-origin:42px 50px">
          <polygon points="42,44 44,49 49,49 45,52 47,57 42,54 37,57 39,52 35,49 40,49" fill="#F5D060" opacity=".9"/>
        </g>
        <g class="star" style="animation-duration:2.8s;animation-delay:.5s;transform-origin:178px 46px">
          <polygon points="178,40 180,45 185,45 181,48 183,53 178,50 173,53 175,48 171,45 176,45" fill="#FF85B3" opacity=".9"/>
        </g>
        <g class="star" style="animation-duration:3s;animation-delay:1s;transform-origin:38px 178px">
          <polygon points="38,172 40,177 45,177 41,180 43,185 38,182 33,185 35,180 31,177 36,177" fill="#D9A8EC" opacity=".9"/>
        </g>
        <g class="star" style="animation-duration:2.5s;animation-delay:1.4s;transform-origin:185px 175px">
          <polygon points="185,169 187,174 192,174 188,177 190,182 185,179 180,182 182,177 178,174 183,174" fill="#F5D060" opacity=".85"/>
        </g>
        <g class="star" style="animation-duration:3.3s;animation-delay:.7s;transform-origin:110px 18px">
          <polygon points="110,13 112,18 117,18 113,21 115,26 110,23 105,26 107,21 103,18 108,18" fill="#FF6FA8" opacity=".8"/>
        </g>
      </svg>
    </div>

    <div class="hero-badge">✦ &nbsp; Invitación Especial &nbsp; ✦</div>
  </div>

  <!-- ══ BODY ══ -->
  <div class="body">

    <!-- Main title -->
    <h1 class="main-title">
      ¡Acompáñanos a celebrar<br>un año más de vida de
      <span class="highlight">la Florecita más bonita!</span>
    </h1>

    <!-- Ornament -->
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-center">✿</div>
      <div class="ornament-line"></div>
    </div>

    <!-- Detail cards -->
    <div class="details">

      <div class="detail-card dc-date">
        <div class="detail-icon-col">🗓</div>
        <div class="detail-text-col">
          <div class="detail-label">Fecha</div>
          <div class="detail-value">Viernes 1 de mayo de 2026</div>
        </div>
      </div>

      <div class="detail-card dc-time">
        <div class="detail-icon-col">🕐</div>
        <div class="detail-text-col">
          <div class="detail-label">Hora</div>
          <div class="detail-value">1:30 de la tarde</div>
        </div>
      </div>

      <div class="detail-card dc-place">
        <div class="detail-icon-col">📍</div>
        <div class="detail-text-col">
          <div class="detail-label">Lugar</div>
          <div class="detail-value">Conjunto Aranjuez de Madrid<br>Torre 5 · Apto 501</div>
        </div>
      </div>

    </div>

    <!-- CTA -->
    <div class="cta-section">
      <div class="cta">¡Te esperamos!</div>
    </div>

    <!-- Bottom petal row -->
    <div class="petal-row">
      <!-- 5 small SVG flowers in different pinks/lilacs -->
      <svg viewBox="0 0 40 40"><g transform="translate(20,20)">
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#FF85B3" opacity=".9"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#FF85B3" opacity=".9" transform="rotate(60)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#FF85B3" opacity=".9" transform="rotate(120)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#FF85B3" opacity=".9" transform="rotate(180)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#FF85B3" opacity=".9" transform="rotate(240)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#FF85B3" opacity=".9" transform="rotate(300)"/>
        <circle r="6" fill="#F5D060"/>
      </g></svg>
      <svg viewBox="0 0 40 40"><g transform="translate(20,20)">
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#B86EC2" opacity=".9"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#B86EC2" opacity=".9" transform="rotate(60)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#B86EC2" opacity=".9" transform="rotate(120)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#B86EC2" opacity=".9" transform="rotate(180)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#B86EC2" opacity=".9" transform="rotate(240)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#B86EC2" opacity=".9" transform="rotate(300)"/>
        <circle r="6" fill="#F5D060"/>
      </g></svg>
      <svg viewBox="0 0 40 40"><g transform="translate(20,20)">
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#E8457A" opacity=".9"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#E8457A" opacity=".9" transform="rotate(60)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#E8457A" opacity=".9" transform="rotate(120)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#E8457A" opacity=".9" transform="rotate(180)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#E8457A" opacity=".9" transform="rotate(240)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#E8457A" opacity=".9" transform="rotate(300)"/>
        <circle r="6" fill="#FFF0A0"/>
      </g></svg>
      <svg viewBox="0 0 40 40"><g transform="translate(20,20)">
